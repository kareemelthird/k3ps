# Supabase local/CI config. Minimal, stable keys only; the CLI fills defaults.
project_id = "ps-managment"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_signup = true

# stripe-webhook must run without JWT verification: Stripe is not a Supabase-authenticated
# caller. Its identity is proved by HMAC signature on the raw body inside the handler.
# See supabase/functions/stripe-webhook/index.ts and ADR-0010 Q2.
[functions.stripe-webhook]
verify_jwt = false
